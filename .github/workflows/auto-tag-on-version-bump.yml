name: Auto Tag On Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Create git tag from package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version bump in package.json
        id: version_check
        run: |
          if ! git diff --name-only HEAD~1 HEAD | grep -qx "package.json"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          AFTER_VERSION=$(node -p "require('./package.json').version")

          if [ "$BEFORE_VERSION" = "$AFTER_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$AFTER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version_check.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.version_check.outputs.version }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
