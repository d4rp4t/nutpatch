name: Patch Coverage

on:
  push:
    paths:
      - 'src/crypto/**'
      - 'scripts/check-patch-compat.ts'
  pull_request:
    paths:
      - 'src/crypto/**'
      - 'scripts/check-patch-compat.ts'
  workflow_dispatch:

jobs:
  coverage:
    name: Check cashu-ts crypto coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Clone cashu-ts
        run: git clone --depth 1 https://github.com/cashubtc/cashu-ts.git ../cashu-ts

      - name: Check patch compatibility
        run: npx tsx scripts/check-patch-compat.ts
